name: fraud_detector
description: AI-powered fraud call detector
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # File picker (for upload feature)
  file_picker: ^8.0.0
  
  # Speech to text
  speech_to_text: ^7.3.0
  
  # TFLite
  tflite_flutter: ^0.11.0

  # Offline Whisper STT
  whisper_flutter_new: ^1.0.1
  
  # File utilities
  path_provider: ^2.1.2
  
  # Permission handling
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/fraud_model.tflite
    - assets/models/vocab.json
    - assets/models/ggml-tiny.en.bin
